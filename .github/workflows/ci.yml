name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm run package

      - name: Verify dist/ is up-to-date
        run: |
          if [[ -n "$(git diff --name-only dist/)" ]]; then
            echo "::error::dist/ is out of date. Run 'npm run all' and commit the changes."
            git diff --stat dist/
            exit 1
          fi

  test:
    needs: build
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        maven-version: ['3.9.9', '3.8.8']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Maven
        uses: ./
        with:
          maven-version: ${{ matrix.maven-version }}

      - name: Verify Maven
        run: mvn --version
